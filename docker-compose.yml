version: '3.8'

services:
  # API Backend (NestJS)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
      CASSANDRA_CONTACT_POINTS: "cassandra"
      CASSANDRA_LOCAL_DATACENTER: "DC1"
      CASSANDRA_KEYSPACE: "cdn_metadata"
    depends_on:
      - rabbitmq
      - minio
      - cassandra
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Edge CDN Simulation (Nginx)
  nginx-edge:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Storage Backend (MinIO)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Metadata Database (Cassandra)
  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "CDN_Cluster"
      CASSANDRA_DC: "DC1"
      CASSANDRA_RACK: "Rack1"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '2.0'

  # Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Video Processing Worker (FFmpeg Transcoding)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
      CASSANDRA_CONTACT_POINTS: "cassandra"
      CASSANDRA_LOCAL_DATACENTER: "DC1"
      CASSANDRA_KEYSPACE: "cdn_metadata"
    depends_on:
      - rabbitmq
      - minio
      - cassandra
    networks:
      - cdn-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

networks:
  cdn-network:
    driver: bridge

volumes:
  nginx_cache:
  minio_data:
  cassandra_data:
